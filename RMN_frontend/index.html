<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRI Segmentation Viewer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .transition-all { transition: all 0.3s ease; }
    #resultJson {
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>

<body id="body" class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-8 transition-all">

  <div class="fixed top-6 right-6 z-50 flex flex-col items-end gap-3">
    <button id="themeToggle" class="p-3 rounded-full bg-transparent border border-gray-200 dark:border-gray-700 shadow-sm hover:scale-110 transition-all">
      <i id="themeIcon" data-lucide="moon" class="w-6 h-6 text-black dark:text-yellow-400"></i>
    </button>
    <button id="buton_status" class="p-2 px-4 rounded-lg font-semibold text-xs text-white bg-indigo-600 hover:bg-indigo-700 transition-all shadow-md">
      Status API
    </button>
  </div>

  <div id="mainCard" class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg transition-all">
    <h1 id="mainTitle" class="text-3xl font-bold mb-6 text-black">Segmentarea tumorilor cerebrale în imagini RMN</h1>

    <div class="mb-6">
      <label id="uploadTitle" class="block text-sm font-bold text-black mb-2 transition-all">Incarca Scanare RMN</label>
      <input id="fileInput" type="file" accept="image/*" 
        class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-all" />
    </div>

    <div class="flex gap-4 mb-6">
      <button id="buton_predict" class="flex-1 py-3 rounded-lg font-semibold text-white bg-gray-400 cursor-not-allowed transition-all" disabled>
        Ruleaza Segmentarea
      </button>
    </div>

    <div id="statusContainer" class="hidden mb-4 p-4 border rounded-lg shadow-sm transition-all">
      <p id="statusText" class="font-medium"></p>
    </div>

    <div id="errorContainer" class="hidden mb-4 p-4 border rounded-lg shadow-sm transition-all text-red-800">
      <p id="errorText" class="font-medium"></p>
    </div>

    <div id="loadingContainer" class="hidden mb-4 p-4 border rounded-lg shadow-sm transition-all text-blue-800">
      <div class="flex items-center gap-3">
        <div id="spinner" class="animate-spin rounded-full h-5 w-5 border-b-2 border-blue-700"></div>
        <p class="font-medium">Se procesează segmentarea...</p>
      </div>
    </div>

    <div id="resultContainer" class="hidden">
      <h2 id="resultsTitle" class="text-xl font-bold mb-4 text-black transition-all">Rezultate Segmentare</h2>
      <div id="imagesGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6"></div>
      
      <details id="json_sum" class="mt-6 border-t pt-4 transition-all">
        <summary class="cursor-pointer text-sm font-medium text-gray-500 hover:text-black transition-all">Raspuns JSON brut</summary>
        <pre id="json_res" class="mt-2 p-4 rounded-lg text-xs overflow-auto max-h-96 transition-all bg-gray-100 text-gray-700"></pre>
      </details>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
